<!DOCTYPE html>
<html>
<head>
    <title>Motor Racing Game</title>
    <style>
        body {
            margin: 0;
            background: #333;
            overflow: hidden;
        }

        #gameArea {
            width: 300px;
            height: 500px;
            background: #555;
            margin: auto;
            position: relative;
            overflow: hidden;
            border: 3px solid white;
        }

        .car {
            width: 50px;
            height: 80px;
            position: absolute;
            bottom: 20px;
            left: 125px;
            font-size: 40px;
            text-align: center;
        }

        .enemy {
            width: 50px;
            height: 80px;
            position: absolute;
            top: -100px;
            font-size: 40px;
            text-align: center;
        }

        #score {
            color: white;
            text-align: center;
            font-size: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="score">Score: 0</div>

<div id="gameArea">
    <!-- 🚗 Player Car -->
    <div class="car" id="player">🚗</div>
</div>

<script>
    let player = document.getElementById("player");
    let gameArea = document.getElementById("gameArea");
    let score = 0;
    let position = 125;

    document.addEventListener("keydown", function(e) {
        if (e.key === "ArrowLeft" && position > 0) {
            position -= 20;
        }
        if (e.key === "ArrowRight" && position < 250) {
            position += 20;
        }
        player.style.left = position + "px";
    });

    function createEnemy() {
        let enemy = document.createElement("div");
        enemy.classList.add("enemy");

        // 🚙 Enemy Car Emoji
        enemy.innerText = "🚙";

        enemy.style.left = Math.floor(Math.random() * 250) + "px";
        gameArea.appendChild(enemy);

        let top = -100;

        let move = setInterval(() => {
            top += 5;
            enemy.style.top = top + "px";

            // Collision detection
            if (
                top > 400 &&
                Math.abs(enemy.offsetLeft - position) < 50
            ) {
                alert("Game Over! Score: " + score);
                location.reload();
            }

            if (top > 500) {
                enemy.remove();
                score++;
                document.getElementById("score").innerText = "Score: " + score;
                clearInterval(move);
            }
        }, 50);
    }

    setInterval(createEnemy, 1500);
</script>

</body>
</html>
